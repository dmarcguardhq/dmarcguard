# DigitalOcean App Platform Specification
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/
spec:
  name: parse-dmarc
  region: nyc
  services:
    - name: web
      dockerfile_path: Dockerfile
      github:
        repo: meysam81/parse-dmarc
        branch: main
        deploy_on_push: true
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-0.5gb
      http_port: 8080
      health_check:
        http_path: /api/statistics
        initial_delay_seconds: 10
        period_seconds: 30
        timeout_seconds: 5
        success_threshold: 1
        failure_threshold: 3
      envs:
        - key: PARSE_DMARC_IMAP_HOST
          scope: RUN_TIME
          type: SECRET
        - key: PARSE_DMARC_IMAP_PORT
          scope: RUN_TIME
          value: "993"
        - key: PARSE_DMARC_IMAP_USERNAME
          scope: RUN_TIME
          type: SECRET
        - key: PARSE_DMARC_IMAP_PASSWORD
          scope: RUN_TIME
          type: SECRET
        - key: PARSE_DMARC_IMAP_MAILBOX
          scope: RUN_TIME
          value: "INBOX"
        - key: PARSE_DMARC_IMAP_USE_TLS
          scope: RUN_TIME
          value: "true"
        - key: PARSE_DMARC_DATABASE_PATH
          scope: RUN_TIME
          value: "/data/db.sqlite"
        - key: PARSE_DMARC_SERVER_PORT
          scope: RUN_TIME
          value: "8080"
        - key: PARSE_DMARC_SERVER_HOST
          scope: RUN_TIME
          value: "0.0.0.0"
