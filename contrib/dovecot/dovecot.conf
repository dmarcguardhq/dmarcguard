# Minimal IMAP-only Dovecot 2.4 config for local testing of the
# parse-dmarc IMAP fetch + parse pipeline. NOT for production.
#
# Wire-up:
#   - listens on 143 (plain IMAP, cleartext allowed — local docker only)
#   - one user `dmarc:dev` via static passwd-file
#   - Maildir at /srv/mail/dmarc/Maildir; init.sh seeds INBOX/new with a
#     sample DMARC aggregate report so the fetcher has something to ingest

# Required first lines in 2.4 — pin config and on-disk storage versions.
dovecot_config_version  = 2.4.0
dovecot_storage_version = 2.4.0

# The dovecot/dovecot image ships without the conventional `dovenull` and
# `dovecot` system users that privilege-separation expects. Override both to
# `vmail` (the one user the image has) — acceptable for local docker-only
# testing; never do this in production.
default_login_user     = vmail
default_internal_user  = vmail
default_internal_group = vmail

protocols {
  imap = yes
}
listen = *

# Plain IMAP, cleartext auth — local docker testing only. Never bind this on a
# public interface.
ssl = no
auth_allow_cleartext = yes
auth_mechanisms = plain login

passdb passwd-file {
  passwd_file_path = /etc/dovecot/users
}
userdb passwd-file {
  passwd_file_path = /etc/dovecot/users
  fields {
    uid:default  = vmail
    gid:default  = vmail
    home:default = /srv/mail/%{user}
  }
}

mail_driver = maildir
mail_path   = ~/Maildir
mail_home   = /srv/mail/%{user}
mail_uid    = vmail
mail_gid    = vmail

namespace inbox {
  separator = .
  prefix    =
  inbox     = yes
}

# Stream logs to stderr so `docker compose logs dovecot` shows them.
log_path       = /dev/stderr
info_log_path  = /dev/stderr
debug_log_path = /dev/stderr
