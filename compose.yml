---
services:
  parse-dmarc:
    build: .
    image: ${IMAGE_NAME:-meysam81/parse-dmarc}
    environment:
      DATABASE_PATH: /data/parse-dmarc.db
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - parse-dmarc:/data

volumes:
  parse-dmarc:
