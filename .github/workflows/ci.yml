name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-templates:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: railway
            file: deploy/railway.json
            type: json
          - name: render
            file: deploy/render.yaml
            type: yaml
          - name: fly
            file: deploy/fly.toml
            type: toml
          - name: heroku-app
            file: deploy/app.json
            type: json
          - name: heroku-yml
            file: deploy/heroku.yml
            type: yaml
          - name: digitalocean
            file: deploy/digitalocean-app.yaml
            type: yaml
          - name: koyeb
            file: deploy/koyeb.yaml
            type: yaml
          - name: zeabur
            file: deploy/zeabur.json
            type: json
          - name: cloudbuild
            file: deploy/cloudbuild.yaml
            type: yaml
          - name: northflank
            file: deploy/northflank.json
            type: json
          - name: coolify
            file: deploy/coolify.yaml
            type: yaml
          - name: caprover
            file: deploy/captain-definition
            type: json
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate ${{ matrix.name }} template (${{ matrix.type }})
        run: |
          case "${{ matrix.type }}" in
            json)
              echo "Validating JSON: ${{ matrix.file }}"
              cat "${{ matrix.file }}" | jq . > /dev/null
              ;;
            yaml)
              echo "Validating YAML: ${{ matrix.file }}"
              python3 -c "import yaml; yaml.safe_load(open('${{ matrix.file }}'))"
              ;;
            toml)
              echo "Validating TOML: ${{ matrix.file }}"
              pip install toml -q
              python3 -c "import toml; toml.load('${{ matrix.file }}')"
              ;;
          esac
          echo "✓ ${{ matrix.name }} template is valid"

  sync-fly-template:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate-templates]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Fly CLI
        if: env.FLY_API_TOKEN != ''
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (if token available)
        if: env.FLY_API_TOKEN != ''
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd deploy
          flyctl deploy --config fly.toml --remote-only || echo "Fly.io deployment skipped (no app configured)"

  checks:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
      - name: Create dist
        run: |
          mkdir -p internal/api/dist
          echo '<h1>Parse-DMARC API</h1>' > internal/api/dist/index.html
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

  build-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Cache docker
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            /tmp/dockercache
          key: docker-cache-${{ runner.os }}-${{ hashFiles('**/Dockerfile') }}
          restore-keys: |
            docker-cache-${{ runner.os }}-
      - name: Build docker
        uses: meysam81/build-docker@main
        with:
          build-args: |
            VERSION=dev-${{ github.sha }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
            BUILT_BY=github-actions
          cache-from: type=local,src=/tmp/dockercache
          cache-to: type=local,dest=/tmp/dockercache
          checkout: false
          cosign: true
          image-name: ghcr.io/${{ github.repository }}
          image-extra-tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.run_id }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          kubescape: true

  release-please:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - id: release-please
        name: Release please
        uses: googleapis/release-please-action@v4
        with:
          release-type: go

  build-prod:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Cache docker
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            /tmp/dockercache
          key: docker-cache-${{ runner.os }}-${{ hashFiles('**/Dockerfile') }}
          restore-keys: |
            docker-cache-${{ runner.os }}-
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Setup Cosign CLI
        uses: sigstore/cosign-installer@v3
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install goreleaser
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt update
          sudo apt install -y goreleaser
          goreleaser --version
      - name: Build docker
        uses: meysam81/build-docker@main
        with:
          build-args: |
            VERSION=${{ needs.release-please.outputs.tag_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
            BUILT_BY=github-actions
          cache-from: type=local,src=/tmp/dockercache
          cache-to: type=local,dest=/tmp/dockercache
          checkout: false
          cosign: true
          image-name: ghcr.io/${{ github.repository }}
          image-extra-tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.tag_name }}
          kubescape: true
      - env:
          GITHUB_TOKEN: ${{ github.token }}
        name: Run goreleaser
        run: goreleaser release --release-notes CHANGELOG.md --clean
